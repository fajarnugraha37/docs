site_name: Nugraha Fajar Notes
site_description: "Long-form engineering notes for backend, Java, architecture, and delivery."
site_url: https://note.nugrahafajar.my.id/
site_author: Nugraha Fajar
repo_url: https://github.com/fajarnugraha37/docs
repo_name: fajarnugraha37/docs
edit_uri: edit/main/.context/learns/
theme:
  name: material
  language: id
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/weather-night
        name: Gunakan tema gelap
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Gunakan tema terang
plugins:
  - search
validation:
  nav:
    omitted_files: ignore
  links:
    anchors: ignore
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
docs_dir: .context/learns
extra_css:
  - assets/stylesheets/extra.css
extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://note.nugrahafajar.my.id/
      name: Website
nav:
  - Home: index.md
  - Notebook: README.md
  - Katalog Lengkap: all-notes.md
